<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>SKY SNIPER</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }
        .page { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; top: 0; left: 0; z-index: 10; }
        .active { display: flex !important; }
        
        /* 대학교 배경 레이어 */
        #bg-overlay { position: absolute; width: 100%; height: 100%; background-size: cover; background-position: center; filter: brightness(0.4); z-index: 1; display: none; }
        
        /* UI 요소 */
        .content { z-index: 20; width: 90%; text-align: center; }
        #timer-display { font-size: 7rem; font-weight: 900; letter-spacing: -3px; margin: 20px 0; }
        input[type="time"] { font-size: 2.5rem; padding: 15px; border-radius: 15px; border: 3px solid #ff3b30; background: #1c1c1e; color: #fff; width: 250px; text-align: center; }
        button { margin-top: 20px; padding: 20px; font-size: 1.5rem; font-weight: 800; border-radius: 20px; border: none; width: 100%; cursor: pointer; -webkit-appearance: none; }
        .btn-start { background: #fff; color: #000; }
        .btn-desk { background: #ff3b30; color: #fff; animation: pulse 1s infinite; }
        
        /* 유튜브 프레임 */
        #video-container { width: 100%; max-width: 360px; aspect-ratio: 16/9; margin: 20px 0; border-radius: 15px; overflow: hidden; display: none; box-shadow: 0 0 30px rgba(255,59,48,0.8); }

        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }
        .blink { animation: blink 0.5s infinite; color: #ff3b30; font-size: 3rem; font-weight: 900; }
        @keyframes blink { 0% {opacity:1} 50% {opacity:0.3} }
    </style>
</head>
<body>
    <div id="bg-overlay"></div>

    <div id="p1" class="page active">
        <div class="content">
            <h1 style="font-size:2.5rem; margin-bottom:10px;">SKY SNIPER</h1>
            <p style="color:#888; margin-bottom:30px;">타겟 시간 설정 후 감시를 시작하십시오</p>
            <input type="time" id="alarm-time">
            <button type="button" class="btn-start" onclick="initSystem()">감시 체계 가동</button>
            <p id="status" style="margin-top:20px; color:#444;">※ 설정 후 화면을 끄지 마세요</p>
        </div>
    </div>

    <div id="p2" class="page">
        <div class="content">
            <div id="uni-name" style="font-weight:bold; letter-spacing:3px; color:#ccc; margin-bottom:10px;">UNIVERSITY ADMITTED</div>
            <div class="blink">공부해!!!</div>
            <div id="video-container"></div>
            <button type="button" class="btn-desk" onclick="startStudy()">책상 앞에 앉았습니다</button>
        </div>
    </div>

    <div id="p3" class="page">
        <div class="content">
            <div id="timer-display">60:00</div>
            <p style="font-size:1.2rem; color:#ff3b30; font-weight:bold;">목표: 서울대학교 정문 돌파</p>
            <button type="button" style="background:none; color:#333; font-size:1rem;" onclick="location.reload()">항복하고 재설정</button>
        </div>
    </div>

    <script>
        const uniData = [
            {n: "SEOUL NATIONAL UNIV.", img: "https://images.unsplash.com/photo-1622397333309-3056849bc70b?q=80&w=1000", vid: "766X9Mv6z90"}, // 동기부여 영상 ID
            {n: "KOREA UNIVERSITY", img: "https://images.unsplash.com/photo-1541339907198-e08756ebafe3?q=80&w=1000", vid: "voPX3Gr-mP0"},
            {n: "YONSEI UNIVERSITY", img: "https://images.unsplash.com/photo-1590059510137-059950798992?q=80&w=1000", vid: "jaxcCwpzQgg"}
        ];

        let targetH, targetM, watchLoop;

        function initSystem() {
            const timeVal = document.getElementById('alarm-time').value;
            if(!timeVal) return alert("시간을 설정하십시오.");

            const [h, m] = timeVal.split(':').map(Number);
            targetH = h; targetM = m;

            document.getElementById('status').innerText = `${timeVal} 에 기습 알람이 울립니다.`;
            document.getElementById('status').style.color = "#ff3b30";

            // 시계 가동
            watchLoop = setInterval(() => {
                const now = new Date();
                if(now.getHours() === targetH && now.getMinutes() === targetM) {
                    clearInterval(watchLoop);
                    triggerAlarm();
                }
            }, 1000);
        }

        function triggerAlarm() {
            const pick = uniData[Math.floor(Math.random() * uniData.length)];
            
            // 배경 설정
            const bg = document.getElementById('bg-overlay');
            bg.style.backgroundImage = `url('${pick.img}')`;
            bg.style.display = "block";

            // 대학교 이름 설정
            document.getElementById('uni-name').innerText = pick.n;

            // 유튜브 영상 삽입 (자동재생)
            const videoBox = document.getElementById('video-container');
            videoBox.style.display = "block";
            videoBox.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${pick.vid}?autoplay=1&mute=0&playsinline=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;

            // 화면 전환
            document.getElementById('p1').classList.remove('active');
            document.getElementById('p2').classList.add('active');
        }

        function startStudy() {
            // 영상 정지 및 배경 숨기기
            document.getElementById('video-container').innerHTML = "";
            document.getElementById('bg-overlay').style.display = "none";
            
            // 타이머 화면으로 전환
            document.getElementById('p2').classList.remove('active');
            document.getElementById('p3').classList.add('active');

            let timeLeft = 3600;
            const timer = setInterval(() => {
                timeLeft--;
                const min = String(Math.floor(timeLeft / 60)).padStart(2, '0');
                const sec = String(timeLeft % 60).padStart(2, '0');
                document.getElementById('timer-display').innerText = `${min}:${sec}`;

                if(timeLeft <= 0) {
                    clearInterval(timer);
                    alert("승리했습니다. 이제 잠시 쉬어도 좋습니다.");
                    location.reload();
                }
            }, 1000);
        }
    </script>
</body>
</html>
