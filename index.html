<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SKY SNIPER</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; overflow: hidden; }
        .page { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        #timer-display { font-size: 5rem; font-weight: bold; }
        input[type="time"] { font-size: 2rem; padding: 10px; border-radius: 10px; border: 2px solid #ff3b30; }
        button { margin-top: 20px; padding: 15px 30px; font-size: 1.2rem; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; }
        .btn-red { background: #ff3b30; color: #fff; }
        .btn-white { background: #fff; color: #000; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, 1px); } }
        .shake { animation: shake 0.1s infinite; color: #ff3b30; font-size: 3rem; font-weight: 900; }
    </style>
</head>
<body>

    <div id="p1" class="page active">
        <h1>TARGET TIME</h1>
        <input type="time" id="target">
        <button class="btn-white" onclick="setAlarm()">감시 시작</button>
        <p id="msg" style="margin-top:20px; color:#666;">시간 설정 후 버튼을 누르세요</p>
    </div>

    <div id="p2" class="page">
        <h2 style="color:#aaa;">UNIVERSITY LOCKED</h2>
        <div class="shake">공부해!!!</div>
        <p>지금 안 하면 미래는 없다.</p>
        <button class="btn-red" onclick="startStudy()">책상 앞에 앉았습니다</button>
    </div>

    <div id="p3" class="page">
        <div id="timer-display">60:00</div>
        <p>집중하세요. 1시간 남았습니다.</p>
        <button style="background:none; color:#444;" onclick="location.reload()">항복하기</button>
    </div>

    <script>
        let alarmTime = null;
        let timerInt = null;

        // 1. 알람 설정
        function setAlarm() {
            const val = document.getElementById('target').value;
            if(!val) return alert("시간을 선택하세요!");
            alarmTime = val;
            document.getElementById('msg').innerText = alarmTime + "에 타겟이 나타납니다.";
            document.getElementById('msg').style.color = "#ff3b30";
            
            // 1초마다 시간 체크
            setInterval(() => {
                const now = new Date();
                const cur = String(now.getHours()).padStart(2,'0') + ":" + String(now.getMinutes()).padStart(2,'0');
                if(cur === alarmTime) {
                    showAlarm();
                }
            }, 1000);
        }

        // 2. 알람 발생 (기습)
        function showAlarm() {
            if(document.getElementById('p2').classList.contains('active')) return;
            document.getElementById('p1').classList.remove('active');
            document.getElementById('p2').classList.add('active');
            
            // 경고음 (브라우저 기본 비프음 효과)
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            osc.type = 'square';
            osc.connect(audioCtx.destination);
            osc.start();
            setTimeout(() => osc.stop(), 3000); // 3초간 강한 비프음
        }

        // 3. 1시간 타이머 시작
        function startStudy() {
            document.getElementById('p2').classList.remove('active');
            document.getElementById('p3').classList.add('active');
            
            let sec = 3600;
            timerInt = setInterval(() => {
                sec--;
                let m = Math.floor(sec / 60);
                let s = sec % 60;
                document.getElementById('timer-display').innerText = 
                    String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
                
                if(sec <= 0) {
                    clearInterval(timerInt);
                    alert("전투 종료. 당신이 이겼습니다.");
                    location.reload();
                }
            }, 1000);
        }
    </script>
</body>
</html>
